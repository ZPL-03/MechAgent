[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mechagent"
version = "0.1.0"
description = "自然语言驱动开源 CAE/FEA 工作流的多智能体仿真产品与编排框架。"
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [{ name = "MechAgent Contributors" }]
keywords = ["cae", "fea", "multi-agent", "langgraph", "calculix", "gmsh"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Topic :: Scientific/Engineering",
  "Typing :: Typed",
]
dependencies = [
  "mechagent-core==0.1.0",
  "pydantic>=2,<3",
  "typer>=0.12",
  "rich>=13",
  "PyYAML>=6",
  "langgraph>=0.2",
  "httpx>=0.27,<1",
  "fastapi>=0.115,<1",
  "uvicorn>=0.30,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "ruff>=0.8",
  "mypy>=1.13",
  "types-PyYAML>=6",
  "build>=1.2",
]
docs = [
  "mkdocs-material>=9",
]

[project.scripts]
mechagent = "mechagent.cli:app"

[project.urls]
Homepage = "https://github.com/ZPL-03/MechAgent"
Repository = "https://github.com/ZPL-03/MechAgent"
Documentation = "https://github.com/ZPL-03/MechAgent/tree/main/docs"
Issues = "https://github.com/ZPL-03/MechAgent/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mechagent = ["py.typed", "ui/static/*", "ui/static/assets/*"]
